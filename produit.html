<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produit - SaveTronik</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .product-detail { max-width: 1000px; margin: 6rem auto 2rem; padding: 0 2rem; }
        .product-detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 3rem; margin-top: 2rem; }
        .product-image-large { background: var(--bg-card); border-radius: 12px; padding: 2rem; display: flex; align-items: center; justify-content: center; min-height: 400px; }
        .product-image-large img { max-width: 100%; max-height: 400px; object-fit: contain; }
        .product-image-large .placeholder { font-size: 8rem; }
        .product-info h1 { color: var(--primary); margin-bottom: 0.5rem; }
        .product-price { font-size: 2rem; color: var(--primary); font-weight: bold; margin: 1rem 0; }
        .product-original-price { text-decoration: line-through; color: var(--text-muted); font-size: 1.2rem; margin-left: 1rem; }
        .product-status { display: inline-block; padding: 0.5rem 1rem; border-radius: 8px; font-weight: bold; margin-bottom: 1rem; }
        .product-status.disponible { background: var(--primary); color: var(--bg-dark); }
        .product-status.vendu { background: #ff4444; color: white; }
        .product-status.hors-stock { background: #888; color: white; }
        .product-description { color: var(--text-muted); line-height: 1.8; margin: 1.5rem 0; }
        .product-specs { background: var(--bg-card); padding: 1.5rem; border-radius: 12px; margin: 1.5rem 0; }
        .product-specs h3 { color: var(--secondary); margin-bottom: 1rem; }
        .spec-item { display: flex; justify-content: space-between; padding: 0.75rem 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .spec-item:last-child { border-bottom: none; }
        .spec-label { color: var(--text-muted); }
        .spec-value { color: var(--text); font-weight: 500; }
        .product-actions { display: flex; gap: 1rem; margin-top: 2rem; }
        .btn-contact { flex: 1; padding: 1rem; background: var(--primary); color: var(--bg-dark); text-align: center; border-radius: 8px; font-weight: bold; text-decoration: none; transition: transform 0.3s; border: none; cursor: pointer; }
        .btn-contact:hover { transform: translateY(-2px); }
        .btn-like-detail { padding: 1rem 1.5rem; background: transparent; border: 2px solid var(--accent); color: var(--accent); border-radius: 8px; cursor: pointer; transition: all 0.3s; font-size: 1rem; }
        .btn-like-detail:hover, .btn-like-detail.liked { background: var(--accent); color: white; }
        .back-link { display: inline-block; color: var(--text-muted); text-decoration: none; margin-bottom: 1rem; }
        .back-link:hover { color: var(--primary); }
        .loading { text-align: center; padding: 4rem; color: var(--text-muted); }
        @media (max-width: 768px) { .product-detail-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <header>
        <div class="nav-container">
            <a href="index.html" class="logo">
                <img src="Images/Logo.png" alt="SaveTronik">
                <span class="logo-text">SaveTronik</span>
            </a>
            <nav>
                <ul>
                    <li><a href="index.html">Accueil</a></li>
                    <li><a href="presentation.html">Présentation</a></li>
                    <li><a href="catalogue.html">Catalogue</a></li>
                    <li><a href="contact.html">Contact & Dons</a></li>
                    <li><a href="panier.html">🛒 Panier <span id="panier-badge" class="panier-badge" style="display:none;">0</span></a></li>
                    <li><a href="#" id="auth-link" onclick="showAuthModal('signin')">🔑 Connexion</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="product-detail">
        <a href="catalogue.html" class="back-link">← Retour au catalogue</a>
        <div id="product-content">
            <div class="loading">Chargement du produit...</div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 SaveTronik - Association de reconditionnement informatique</p>
    </footer>

    <!-- ✅ CDN Supabase — NE PAS redéclarer "db" dans ce fichier, auth.js s'en charge -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="auth.js"></script>

    <script>
        // ✅ window.db est créé par auth.js — on l'utilise directement ici

        window.addEventListener('error', (event) => {
            console.error('[SaveTronik Produit] ❌ Erreur JS globale :', event.error);
        });
        window.addEventListener('unhandledrejection', (event) => {
            console.error('[SaveTronik Produit] ❌ Promise rejetée :', event.reason);
        });

        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');

        let userId = localStorage.getItem('savetronik_userid');
        if (!userId) {
            userId = crypto.randomUUID();
            localStorage.setItem('savetronik_userid', userId);
        }

        async function loadProduct() {
            console.log('[SaveTronik Produit] 🔄 loadProduct() — id :', productId);

            const content = document.getElementById('product-content');

            if (!productId) {
                content.innerHTML = '<div class="loading">Produit introuvable. <a href="catalogue.html">Retour au catalogue</a></div>';
                return;
            }

            try {
                const { data: product, error } = await window.db
                    .from('produits')
                    .select('*')
                    .eq('id', productId)
                    .single();

                if (error || !product) {
                    console.error('[SaveTronik Produit] ❌ Produit non trouvé :', error?.message);
                    content.innerHTML = '<div class="loading">Produit introuvable. <a href="catalogue.html">Retour au catalogue</a></div>';
                    return;
                }

                console.log('[SaveTronik Produit] ✅ Produit chargé :', product.nom);

                const { data: likes, error: likesError } = await window.db
                    .from('likes')
                    .select('*')
                    .eq('product_id', productId);

                if (likesError) console.warn('[SaveTronik Produit] ⚠️ Erreur likes :', likesError.message);

                const likeCount = likes?.length || 0;
                const userLiked = likes?.some(l => l.user_id === userId) || false;

                const statusClass = product.status || 'disponible';
                const statusLabel = statusClass === 'disponible' ? 'Disponible' : statusClass === 'vendu' ? 'Vendu' : 'Hors stock';
                const imageHtml = product.image_url ? `<img src="${product.image_url}" alt="${product.nom}">` : `<div class="placeholder">💻</div>`;

                const specsData = [
                    { label: 'Année', value: product.annee },
                    { label: 'Provenance', value: product.provenance },
                    { label: 'Marque', value: product.marque },
                    { label: 'Modèle', value: product.modele },
                    { label: 'État', value: product.etat },
                    { label: 'Garantie', value: product.garantie },
                ].filter(s => s.value);

                const specsHtml = specsData.length ? `
                    <div class="product-specs">
                        <h3>Caractéristiques</h3>
                        ${specsData.map(s => `
                            <div class="spec-item">
                                <span class="spec-label">${s.label}</span>
                                <span class="spec-value">${s.value}</span>
                            </div>`).join('')}
                    </div>` : '';

                content.innerHTML = `
                    <div class="product-detail-grid">
                        <div class="product-image-large">${imageHtml}</div>
                        <div class="product-info">
                            <span class="product-status ${statusClass}">${statusLabel}</span>
                            <h1>${product.nom}</h1>
                            <div class="product-price">
                                ${product.prix}€
                                ${product.prix_original ? `<span class="product-original-price">${product.prix_original}€</span>` : ''}
                            </div>
                            <p class="product-description">${product.description || 'Aucune description disponible.'}</p>
                            ${specsHtml}
                            <div class="product-actions">
                                <button class="btn-contact" onclick="addToPanierFromProduct()">🛒 Ajouter au panier</button>
                                <a href="contact.html" class="btn-contact" style="background:var(--secondary);">📩 Contacter</a>
                                <button id="like-btn" class="btn-like-detail ${userLiked ? 'liked' : ''}">
                                    ${userLiked ? '❤️' : '🤍'} ${likeCount} j'aime
                                </button>
                            </div>
                        </div>
                    </div>`;

                console.log('[SaveTronik Produit] ✅ HTML injecté');

                document.getElementById('like-btn').addEventListener('click', async () => {
                    try {
                        const { data: existingLike, error: err } = await window.db
                            .from('likes').select('*')
                            .eq('product_id', productId).eq('user_id', userId)
                            .maybeSingle();

                        if (err) { console.error('[SaveTronik Produit] ❌ Erreur recherche like :', err.message); return; }

                        if (existingLike) {
                            await window.db.from('likes').delete().eq('id', existingLike.id);
                        } else {
                            await window.db.from('likes').insert({ product_id: productId, user_id: userId });
                        }
                        await loadProduct();
                    } catch (err) {
                        console.error('[SaveTronik Produit] ❌ Exception like :', err);
                    }
                });

            } catch (err) {
                console.error('[SaveTronik Produit] ❌ Exception loadProduct() :', err);
                document.getElementById('product-content').innerHTML = '<div class="loading">Erreur lors du chargement du produit</div>';
            }
        }

        async function addToPanierFromProduct() {
            if (!productId) return;

            const { data: product, error } = await window.db
                .from('produits').select('*').eq('id', productId).single();

            if (error || !product) {
                console.error('[SaveTronik Produit] ❌ Erreur ajout panier :', error?.message);
                return;
            }

            addToPanier(product);  // ✅ Fonction d'auth.js
            showNotification(product.nom + ' ajouté au panier !', 'success');
        }

        document.addEventListener('DOMContentLoaded', () => {
            console.log('[SaveTronik Produit] 🚀 DOM prêt — loadProduct()');
            loadProduct();
        });
    </script>
</body>
</html>
