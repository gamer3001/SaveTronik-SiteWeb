<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="Images/Logo.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - SaveTronik</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .admin-container { max-width: 1000px; margin: 0 auto; padding: 6rem 2rem 2rem; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        .admin-header h1 { color: var(--primary); }
        .btn-logout { background: #ff4444; color: white; padding: 0.5rem 1rem; border: none; border-radius: 8px; cursor: pointer; }

        .admin-section { background: var(--bg-card); padding: 2rem; border-radius: 12px; margin-bottom: 2rem; }
        .admin-section h2 { color: var(--secondary); margin-bottom: 1.5rem; }

        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
        .form-full { width: 100%; }

        .image-upload {
            border: 2px dashed rgba(255,255,255,0.2);
            padding: 2rem;
            text-align: center;
            border-radius: 8px;
            cursor: pointer;
            transition: border-color 0.3s;
        }
        .image-upload:hover { border-color: var(--primary); }
        .image-upload img { max-width: 200px; max-height: 200px; margin-top: 1rem; }

        .products-list { margin-top: 2rem; }
        .product-item {
            display: grid;
            grid-template-columns: 80px 1fr 100px 100px 150px;
            gap: 1rem;
            align-items: center;
            padding: 1rem;
            background: var(--bg-dark);
            border-radius: 8px;
            margin-bottom: 0.5rem;
        }
        .product-item img { width: 80px; height: 60px; object-fit: cover; border-radius: 4px; }
        .product-item .status-select { padding: 0.5rem; background: var(--bg-card); border: 1px solid #333; color: white; border-radius: 4px; }
        .btn-delete { background: #ff4444; color: white; border: none; padding: 0.5rem 1rem; border-radius: 4px; cursor: pointer; }
        .btn-edit { background: var(--primary); color: var(--bg-dark); border: none; padding: 0.5rem 1rem; border-radius: 4px; cursor: pointer; }

        .notification { position: fixed; top: 100px; right: 20px; padding: 1rem 2rem; border-radius: 8px; z-index: 1000; animation: slideIn 0.3s; }
        .notification.success { background: var(--primary); color: var(--bg-dark); }
        .notification.error { background: #ff4444; color: white; }

        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
    </style>
</head>
<body>
    <header>
        <div class="nav-container">
            <a href="index.html" class="logo">
                <img src="Images/Logo.png" alt="SaveTronik">
                <span class="logo-text">SaveTronik</span>
            </a>
            <nav>
                <ul>
                    <li><a href="index.html">Accueil</a></li>
                    <li><a href="presentation.html">Présentation</a></li>
                    <li><a href="catalogue.html">Catalogue</a></li>
                    <li><a href="contact.html">Contact & Dons</a></li>
                    <li><a href="panier.html">🛒 Panier <span id="panier-badge" class="panier-badge" style="display:none;">0</span></a></li>
                    <li><a href="#" id="auth-link" onclick="showAuthModal('signin')">🔑 Connexion</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="admin-container">
        <div class="admin-header">
            <h1>Gestion du Catalogue</h1>
            <button class="btn-logout" onclick="logout()">Déconnexion</button>
        </div>

        <!-- Ajouter/Modifier un produit -->
        <div class="admin-section">
            <h2 id="form-title">Ajouter un produit</h2>
            <form id="product-form">
                <input type="hidden" id="product-id">

                <div class="form-row">
                    <div class="form-group">
                        <label>Nom du produit *</label>
                        <input type="text" id="nom" required placeholder="Ex: Ordinateur Portable Pro">
                    </div>
                    <div class="form-group">
                        <label>Prix (€) *</label>
                        <input type="number" id="prix" required placeholder="199">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Prix original (€) - optionnel</label>
                        <input type="number" id="prix_original" placeholder="899">
                    </div>
                    <div class="form-group">
                        <label>Statut</label>
                        <select id="status">
                            <option value="disponible">Disponible</option>
                            <option value="hors-stock">Hors stock</option>
                            <option value="vendu">Vendu</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Marque</label>
                        <input type="text" id="marque" placeholder="Ex: Dell, HP, Lenovo">
                    </div>
                    <div class="form-group">
                        <label>Modèle</label>
                        <input type="text" id="modele" placeholder="Ex: Latitude E7470">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Année</label>
                        <input type="number" id="annee" placeholder="Ex: 2020">
                    </div>
                    <div class="form-group">
                        <label>Provenance</label>
                        <input type="text" id="provenance" placeholder="Ex: Entreprise ABC">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>État</label>
                        <select id="etat">
                            <option value=">-- Sélectionner --</option>
                            <option value="Neuf">Neuf</option>
                            <option value="Comme neuf">Comme neuf</option>
                            <option value="Excellent">Excellent</option>
                            <option value="Très bon">Très bon</option>
                            <option value="Bon">Bon</option>
                            <option value="Correct">Correct</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Garantie</label>
                        <input type="text" id="garantie" placeholder="Ex: 6 mois, 1 an">
                    </div>
                </div>

                <div class="form-group">
                    <label>Description</label>
                    <textarea id="description" rows="3" placeholder="Description du produit..."></textarea>
                </div>

                <div class="form-group">
                    <label>Image</label>
                    <div class="image-upload" id="image-upload" onclick="document.getElementById('image').click()">
                        <p>Cliquez pour uploader une image</p>
                        <input type="file" id="image" accept="image/*" style="display:none" onchange="previewImage(this)">
                        <img id="image-preview" style="display:none">
                    </div>
                </div>

                <div style="display: flex; gap: 1rem; margin-top: 1rem;">
                    <button type="submit" class="cta" id="btn-submit">Ajouter le produit</button>
                    <button type="button" class="btn-like" style="border-color: #888; color: #888;" onclick="resetForm()">Annuler</button>
                </div>
            </form>
        </div>

        <!-- Liste des produits -->
        <div class="admin-section">
            <h2>Produits existants</h2>
            <div id="products-list" class="products-list">Chargement...</div>
        </div>
    </main>

    <!-- ✅ CDN Supabase + auth.js (crée window.db) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="auth.js"></script>
    <script>
        // ✅ window.db est créé par auth.js

        // =========================================================
        // VÉRIFICATION ACCÈS ADMIN
        // Le rôle admin est défini dans Supabase Dashboard :
        // Authentication > Users > [compte] > Edit > user_metadata
        // Ajouter : { "role": "admin" }
        // Aucun email ou mot de passe en dur dans le code.
        // =========================================================

        async function verifierAdmin() {
            const session = localStorage.getItem('savetronik_session');
            if (!session) {
                alert('Accès refusé : vous devez être connecté.');
                window.location.href = 'index.html';
                return false;
            }
            try {
                const sessionData = JSON.parse(session);
                const { data, error } = await window.db.auth.getUser(sessionData.access_token);
                if (error || !data.user) {
                    alert('Session invalide. Reconnectez-vous.');
                    window.location.href = 'index.html';
                    return false;
                }
                if (data.user.user_metadata?.role !== 'admin') {
                    alert('Accès refusé : droits administrateur requis.');
                    window.location.href = 'index.html';
                    return false;
                }
                console.log('[SaveTronik Admin] ✅ Accès admin accordé');
                return true;
            } catch (e) {
                alert('Erreur inattendue. Reconnectez-vous.');
                window.location.href = 'index.html';
                return false;
            }
        }

        let uploadedImageUrl = null;

        // =========================================================
        // CHARGEMENT DE LA LISTE DES PRODUITS (admin)
        // =========================================================
        async function loadProducts() {
            console.log('[SaveTronik Admin] 🔄 loadProducts() appelée');

            const list = document.getElementById('products-list');
            if (!list) {
                console.error('[SaveTronik Admin] ❌ Élément #products-list introuvable dans le DOM !');
                return;
            }

            list.innerHTML = '<p>Chargement...</p>';

            try {
                const { data: products, error } = await window.db
                    .from('produits')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) {
                    console.error('[SaveTronik Admin] ❌ Erreur Supabase (SELECT produits) :', error.message, error);
                    list.innerHTML = `<p style="color:#ff4444;">Erreur : ${error.message}</p>`;
                    return;
                }

                console.log('[SaveTronik Admin] ✅ Produits reçus :', products?.length ?? 0, 'produit(s)', products);

                if (!products || products.length === 0) {
                    list.innerHTML = '<p>Aucun produit. Ajoutez-en un !</p>';
                    return;
                }

                list.innerHTML = products.map(p => `
                    <div class="product-item">
                        <img src="${p.image_url || 'Images/Logo.png'}" alt="${p.nom}">
                        <div>
                            <strong>${p.nom}</strong><br>
                            <small style="color: var(--text-muted)">${p.description?.substring(0, 50) || ''}...</small>
                        </div>
                        <div style="color: var(--primary); font-weight: bold;">${p.prix}€</div>
                        <select class="status-select" onchange="updateStatus('${p.id}', this.value)">
                            <option value="disponible" ${p.status === 'disponible' ? 'selected' : ''}>Dispo</option>
                            <option value="hors-stock" ${p.status === 'hors-stock' ? 'selected' : ''}>Hors stock</option>
                            <option value="vendu" ${p.status === 'vendu' ? 'selected' : ''}>Vendu</option>
                        </select>
                        <div style="display:flex;gap:0.5rem;">
                            <button class="btn-edit" onclick="editProduct('${p.id}')">✏️</button>
                            <button class="btn-delete" onclick="deleteProduct('${p.id}')">🗑️</button>
                        </div>
                    </div>
                `).join('');

                console.log('[SaveTronik Admin] ✅ Liste rendue avec succès');

            } catch (err) {
                console.error('[SaveTronik Admin] ❌ Erreur inattendue dans loadProducts() :', err);
                list.innerHTML = `<p style="color:#ff4444;">Erreur inattendue : ${err.message}</p>`;
            }
        }

        // =========================================================
        // UPLOAD ET PRÉVISUALISATION D'IMAGE
        // =========================================================
        async function previewImage(input) {
            if (input.files && input.files[0]) {
                const file = input.files[0];
                console.log('[SaveTronik Admin] 🖼️ Upload image :', file.name, '(', file.size, 'octets)');

                const fileName = `${Date.now()}_${file.name}`;
                const { data, error } = await window.db.storage
                    .from('products')
                    .upload(fileName, file);

                if (error) {
                    console.error('[SaveTronik Admin] ❌ Erreur upload image :', error.message, error);
                    showNotification('Erreur upload image : ' + error.message, 'error');
                    return;
                }

                const { data: urlData } = window.db.storage
                    .from('products')
                    .getPublicUrl(fileName);

                uploadedImageUrl = urlData.publicUrl;
                console.log('[SaveTronik Admin] ✅ Image uploadée, URL publique :', uploadedImageUrl);

                document.getElementById('image-preview').src = uploadedImageUrl;
                document.getElementById('image-preview').style.display = 'block';
            }
        }

        // =========================================================
        // SOUMISSION DU FORMULAIRE (ajout ou modification)
        // =========================================================
        document.getElementById('product-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const productData = {
                nom: document.getElementById('nom').value,
                prix: parseFloat(document.getElementById('prix').value),
                prix_original: document.getElementById('prix_original').value
                    ? parseFloat(document.getElementById('prix_original').value)
                    : null,
                description: document.getElementById('description').value,
                status: document.getElementById('status').value,
                image_url: uploadedImageUrl,
                marque: document.getElementById('marque').value || null,
                modele: document.getElementById('modele').value || null,
                annee: document.getElementById('annee').value ? parseInt(document.getElementById('annee').value) : null,
                provenance: document.getElementById('provenance').value || null,
                etat: document.getElementById('etat').value || null,
                garantie: document.getElementById('garantie').value || null
            };

            const productId = document.getElementById('product-id').value;
            console.log('[SaveTronik Admin] 💾 Soumission formulaire — mode :', productId ? 'modification' : 'ajout', productData);

            try {
                let result;
                if (productId) {
                    result = await window.db.from('produits').update(productData).eq('id', productId);
                    if (result.error) {
                        console.error('[SaveTronik Admin] ❌ Erreur UPDATE produit :', result.error.message);
                        showNotification('Erreur : ' + result.error.message, 'error');
                    } else {
                        console.log('[SaveTronik Admin] ✅ Produit modifié avec succès');
                        showNotification('Produit modifié !', 'success');
                        resetForm();
                        loadProducts();
                    }
                } else {
                    result = await window.db.from('produits').insert(productData);
                    if (result.error) {
                        console.error('[SaveTronik Admin] ❌ Erreur INSERT produit :', result.error.message);
                        showNotification('Erreur : ' + result.error.message, 'error');
                    } else {
                        console.log('[SaveTronik Admin] ✅ Produit ajouté avec succès');
                        showNotification('Produit ajouté !', 'success');
                        resetForm();
                        loadProducts();
                    }
                }
            } catch (err) {
                console.error('[SaveTronik Admin] ❌ Erreur inattendue soumission formulaire :', err);
                showNotification('Erreur inattendue : ' + err.message, 'error');
            }
        });

        // =========================================================
        // MISE À JOUR DU STATUT
        // =========================================================
        async function updateStatus(id, status) {
            console.log('[SaveTronik Admin] 🔄 updateStatus() — produit :', id, '→', status);

            const { error } = await window.db.from('produits').update({ status }).eq('id', id);

            if (error) {
                console.error('[SaveTronik Admin] ❌ Erreur updateStatus :', error.message);
                showNotification('Erreur mise à jour statut : ' + error.message, 'error');
            } else {
                console.log('[SaveTronik Admin] ✅ Statut mis à jour');
                showNotification('Statut mis à jour', 'success');
            }
        }

        // =========================================================
        // SUPPRESSION D'UN PRODUIT
        // =========================================================
        async function deleteProduct(id) {
            if (!confirm('Supprimer ce produit ?')) return;

            console.log('[SaveTronik Admin] 🗑️ deleteProduct() — id :', id);

            try {
                const { error: likesError } = await window.db.from('likes').delete().eq('product_id', id);
                if (likesError) {
                    console.warn('[SaveTronik Admin] ⚠️ Erreur suppression likes associés :', likesError.message);
                }

                const { error: prodError } = await window.db.from('produits').delete().eq('id', id);
                if (prodError) {
                    console.error('[SaveTronik Admin] ❌ Erreur suppression produit :', prodError.message);
                    showNotification('Erreur suppression : ' + prodError.message, 'error');
                } else {
                    console.log('[SaveTronik Admin] ✅ Produit supprimé');
                    showNotification('Produit supprimé', 'success');
                    loadProducts();
                }
            } catch (err) {
                console.error('[SaveTronik Admin] ❌ Erreur inattendue deleteProduct() :', err);
            }
        }

        // =========================================================
        // ÉDITION D'UN PRODUIT
        // =========================================================
        async function editProduct(id) {
            console.log('[SaveTronik Admin] ✏️ editProduct() — id :', id);

            try {
                const { data, error } = await window.db.from('produits').select('*').eq('id', id).single();

                if (error) {
                    console.error('[SaveTronik Admin] ❌ Erreur chargement produit pour édition :', error.message);
                    showNotification('Erreur : ' + error.message, 'error');
                    return;
                }

                if (data) {
                    document.getElementById('product-id').value = data.id;
                    document.getElementById('nom').value = data.nom;
                    document.getElementById('prix').value = data.prix;
                    document.getElementById('prix_original').value = data.prix_original || '';
                    document.getElementById('description').value = data.description || '';
                    document.getElementById('status').value = data.status;
                    document.getElementById('marque').value = data.marque || '';
                    document.getElementById('modele').value = data.modele || '';
                    document.getElementById('annee').value = data.annee || '';
                    document.getElementById('provenance').value = data.provenance || '';
                    document.getElementById('etat').value = data.etat || '';
                    document.getElementById('garantie').value = data.garantie || '';
                    document.getElementById('form-title').textContent = 'Modifier le produit';
                    document.getElementById('btn-submit').textContent = 'Enregistrer';

                    if (data.image_url) {
                        uploadedImageUrl = data.image_url;
                        document.getElementById('image-preview').src = data.image_url;
                        document.getElementById('image-preview').style.display = 'block';
                    }

                    window.scrollTo(0, 0);
                    console.log('[SaveTronik Admin] ✅ Formulaire pré-rempli pour :', data.nom);
                }
            } catch (err) {
                console.error('[SaveTronik Admin] ❌ Erreur inattendue editProduct() :', err);
            }
        }

        // =========================================================
        // RÉINITIALISATION DU FORMULAIRE
        // =========================================================
        function resetForm() {
            document.getElementById('product-form').reset();
            document.getElementById('product-id').value = '';
            document.getElementById('form-title').textContent = 'Ajouter un produit';
            document.getElementById('btn-submit').textContent = 'Ajouter le produit';
            uploadedImageUrl = null;
            document.getElementById('image-preview').style.display = 'none';
            console.log('[SaveTronik Admin] 🔁 Formulaire réinitialisé');
        }

        // =========================================================
        // DÉCONNEXION
        // =========================================================
        async function logout() {
            await window.db.auth.signOut();
            localStorage.removeItem('savetronik_session');
            localStorage.removeItem('savetronik_panier');
            console.log('[SaveTronik Admin] 👋 Déconnexion admin');
            window.location.href = 'index.html';
        }

        // =========================================================
        // NOTIFICATION VISUELLE
        // =========================================================
        function showNotification(message, type) {
            const notif = document.createElement('div');
            notif.className = `notification ${type}`;
            notif.textContent = message;
            document.body.appendChild(notif);
            setTimeout(() => notif.remove(), 3000);
        }

        // =========================================================
        // ✅ CHARGEMENT INITIAL — après que le DOM est entièrement prêt
        // =========================================================
        document.addEventListener('DOMContentLoaded', async () => {
            console.log('[SaveTronik Admin] 🚀 DOM prêt — vérification admin');
            const ok = await verifierAdmin();
            if (ok) loadProducts();
        });
    </script>
</body>
</html>
